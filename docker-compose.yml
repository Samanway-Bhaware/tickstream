services:
  # ---------------------------------------------------------------------------
  # tickstream — the ingestion pipeline
  # ---------------------------------------------------------------------------
  tickstream:
    build: .
    environment:
      TICKSTREAM_LOG_FORMAT: json
      TICKSTREAM_LOG_LEVEL: INFO
      TICKSTREAM_METRICS_PORT: "9090"
    ports:
      - "9090:9090"     # Prometheus /metrics
    volumes:
      - tick_data:/app/tick_data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9090/metrics')"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # Prometheus — scrapes /metrics from tickstream
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.52.0
    ports:
      - "9091:9090"     # Prometheus UI on host port 9091
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    restart: unless-stopped
    depends_on:
      - tickstream

  # ---------------------------------------------------------------------------
  # Grafana — dashboards
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/tickstream.json
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  tick_data:
  prometheus_data:
  grafana_data:
